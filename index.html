<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JordanVPN | Регистрация</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui; background: #0a0a0a; color: #fff; line-height: 1.5; }
        .container { max-width: 500px; margin: 50px auto; padding: 20px; }
        .form-card { background: #111; border: 1px solid #222; border-radius: 24px; padding: 32px; }
        h2 { margin-bottom: 24px; text-align: center; }
        input { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; border-radius: 40px; color: #fff; margin-bottom: 16px; }
        button { width: 100%; padding: 12px; background: #fff; color: #000; border: none; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .alert { padding: 12px; border-radius: 12px; margin-bottom: 16px; display: none; }
        .alert-error { background: rgba(231,76,60,0.1); border: 1px solid #e74c3c; color: #e74c3c; }
        .alert-success { background: rgba(46,204,113,0.1); border: 1px solid #2ecc71; color: #2ecc71; }
        .switch { text-align: center; margin-top: 16px; font-size: 14px; color: #888; cursor: pointer; }
        .switch a { color: #fff; text-decoration: none; }
        .hidden { display: none; }
        .link-code { background: #1a1a1a; padding: 12px; border-radius: 12px; font-family: monospace; word-break: break-all; margin-top: 12px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginForm" class="form-card">
            <h2>🔐 Вход</h2>
            <div id="loginAlert" class="alert"></div>
            <input type="text" id="loginUsername" placeholder="Имя пользователя">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button onclick="login()">Войти</button>
            <div class="switch">Нет аккаунта? <a onclick="showRegister()">Зарегистрироваться</a></div>
        </div>

        <div id="registerForm" class="form-card hidden">
            <h2>📝 Регистрация</h2>
            <div id="registerAlert" class="alert"></div>
            <input type="text" id="regUsername" placeholder="Имя пользователя">
            <input type="password" id="regPassword" placeholder="Пароль">
            <button onclick="register()">Зарегистрироваться</button>
            <div class="switch">Уже есть аккаунт? <a onclick="showLogin()">Войти</a></div>
        </div>

        <div id="profileForm" class="form-card hidden">
            <h2>👤 Профиль</h2>
            <div id="profileInfo"></div>
            <div id="subscriptionsList"></div>
            <div style="margin-top: 20px;">
                <input type="text" id="telegramIdInput" placeholder="Введите Telegram ID">
                <button onclick="saveTelegramId()">Сохранить Telegram ID</button>
                <button onclick="getTrial()" style="margin-top: 10px;">🎁 Пробный период (3 дня)</button>
            </div>
            <div id="trialMessage" class="alert"></div>
            <div style="margin-top: 20px;">
                <div id="referralLink" class="link-code"></div>
                <button onclick="copyReferralLink()">📋 Копировать реферальную ссылку</button>
            </div>
            <button onclick="logout()" style="margin-top: 20px; background: transparent; border: 1px solid #fff; color: #fff;">Выйти</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://vpntelegramproxy.mooo.com:8443';
        let currentUser = null;

        function showLogin() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('profileForm').classList.add('hidden');
        }

        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('profileForm').classList.add('hidden');
        }

        function showProfile() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('profileForm').classList.remove('hidden');
            loadProfile();
        }

        function showAlert(elementId, message, type) {
            const el = document.getElementById(elementId);
            el.className = `alert alert-${type}`;
            el.innerHTML = message;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            if (!username || !password) {
                showAlert('loginAlert', '❌ Заполните все поля', 'error');
                return;
            }
            try {
                const res = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    currentUser = data.user;
                    localStorage.setItem('user', JSON.stringify(currentUser));
                    showProfile();
                } else {
                    showAlert('loginAlert', data.message || '❌ Неверный логин или пароль', 'error');
                }
            } catch(e) {
                showAlert('loginAlert', '❌ Ошибка сервера', 'error');
            }
        }

        async function register() {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            if (!username || !password) {
                showAlert('registerAlert', '❌ Заполните все поля', 'error');
                return;
            }
            try {
                const res = await fetch(`${API_URL}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    showAlert('registerAlert', '✅ Регистрация успешна! Теперь войдите.', 'success');
                    setTimeout(showLogin, 2000);
                } else {
                    showAlert('registerAlert', data.message || '❌ Ошибка регистрации', 'error');
                }
            } catch(e) {
                showAlert('registerAlert', '❌ Ошибка сервера', 'error');
            }
        }

        async function loadProfile() {
            if (!currentUser) return;
            document.getElementById('profileInfo').innerHTML = `<p><strong>${currentUser.username}</strong></p><p>💰 Баланс: ${currentUser.balance || 0} руб</p><p>🆔 Telegram ID: ${currentUser.telegram_id || 'не указан'}</p>`;
            if (currentUser.telegram_id) {
                document.getElementById('referralLink').innerHTML = `https://t.me/jordanteamvpnbot?start=ref_${currentUser.id}`;
            } else {
                document.getElementById('referralLink').innerHTML = 'Введите Telegram ID, чтобы получить ссылку';
            }
            try {
                const res = await fetch(`${API_URL}/api/subscriptions?user_id=${currentUser.id}`);
                const data = await res.json();
                const subsList = document.getElementById('subscriptionsList');
                if (data.subscriptions && data.subscriptions.length > 0) {
                    subsList.innerHTML = '<h3>📋 Мои подписки</h3>' + data.subscriptions.map(s => `
                        <div style="padding: 12px; border-bottom: 1px solid #333;">
                            <div>${s.type} — ${s.status === 'active' ? '✅ Активна' : '❌ Истекла'}</div>
                            <div>До: ${s.expiry_date ? s.expiry_date.slice(0,10) : '—'}</div>
                            ${s.link ? `<div class="link-code">${s.link}</div><button onclick="navigator.clipboard.writeText('${s.link}')">📋 Копировать</button>` : ''}
                        </div>
                    `).join('');
                } else {
                    subsList.innerHTML = '<h3>📋 Мои подписки</h3><div>Нет активных подписок</div>';
                }
            } catch(e) { console.error(e); }
        }

        async function saveTelegramId() {
            const telegramId = document.getElementById('telegramIdInput').value.trim();
            if (!telegramId || !/^\d+$/.test(telegramId)) {
                showAlert('trialMessage', '❌ Введите корректный Telegram ID (только цифры)', 'error');
                return;
            }
            try {
                const res = await fetch(`${API_URL}/api/user/update_telegram`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: currentUser.id, telegram_id: parseInt(telegramId) })
                });
                const data = await res.json();
                if (data.success) {
                    currentUser.telegram_id = parseInt(telegramId);
                    localStorage.setItem('user', JSON.stringify(currentUser));
                    loadProfile();
                    showAlert('trialMessage', '✅ Telegram ID сохранён!', 'success');
                } else {
                    showAlert('trialMessage', data.message || '❌ Ошибка', 'error');
                }
            } catch(e) {
                showAlert('trialMessage', '❌ Ошибка сервера', 'error');
            }
        }

        async function getTrial() {
            if (!currentUser || !currentUser.telegram_id) {
                showAlert('trialMessage', '❌ Сначала сохраните Telegram ID', 'error');
                return;
            }
            const msgDiv = document.getElementById('trialMessage');
            msgDiv.className = 'alert alert-info';
            msgDiv.innerHTML = '🔄 Создаю VPN...';
            msgDiv.style.display = 'block';
            try {
                const res = await fetch(`${API_URL}/api/trial`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telegram_id: currentUser.telegram_id })
                });
                const data = await res.json();
                if (data.success && data.link) {
                    msgDiv.className = 'alert alert-success';
                    msgDiv.innerHTML = `✅ VPN готов! <br><div class="link-code">${data.link}</div><button onclick="navigator.clipboard.writeText('${data.link}')">📋 Копировать</button>`;
                    loadProfile();
                } else {
                    msgDiv.className = 'alert alert-error';
                    msgDiv.innerHTML = data.message || '❌ Ошибка получения VPN';
                }
            } catch(e) {
                msgDiv.className = 'alert alert-error';
                msgDiv.innerHTML = '❌ Ошибка сервера';
            }
        }

        function copyReferralLink() {
            const link = document.getElementById('referralLink').innerText;
            if (link && link !== 'Введите Telegram ID, чтобы получить ссылку') {
                navigator.clipboard.writeText(link);
                showAlert('trialMessage', '✅ Ссылка скопирована!', 'success');
            } else {
                showAlert('trialMessage', '❌ Сначала сохраните Telegram ID', 'error');
            }
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('user');
            showLogin();
        }

        const saved = localStorage.getItem('user');
        if (saved) {
            currentUser = JSON.parse(saved);
            showProfile();
        } else {
            showLogin();
        }
    </script>
</body>
</html>
