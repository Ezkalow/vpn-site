<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JordanVPN | Пробный VPN</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui; background: #000; color: #fff; line-height: 1.5; padding: 20px; }
        .container { max-width: 500px; margin: 50px auto; background: #0a0a0a; border: 1px solid #222; border-radius: 24px; padding: 40px; text-align: center; }
        h1 { font-size: 28px; margin-bottom: 8px; }
        .sub { color: #666; margin-bottom: 32px; }
        input { width: 100%; padding: 14px 20px; background: #1a1a1a; border: 1px solid #333; border-radius: 40px; color: #fff; font-size: 16px; margin-bottom: 16px; }
        button { width: 100%; padding: 14px; background: #fff; color: #000; border: none; border-radius: 40px; font-weight: 600; cursor: pointer; font-size: 16px; }
        .result { margin-top: 20px; padding: 16px; border-radius: 16px; display: none; }
        .success { background: rgba(46,204,113,0.1); border: 1px solid #2ecc71; display: block; }
        .error { background: rgba(231,76,60,0.1); border: 1px solid #e74c3c; display: block; }
        .link-code { background: #1a1a1a; padding: 12px; border-radius: 12px; font-family: monospace; word-break: break-all; margin: 16px 0; font-size: 12px; }
        .footer { margin-top: 24px; font-size: 12px; color: #666; }
        a { color: #fff; }
        .loading { display: none; margin: 16px 0; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇩🇪 JordanVPN</h1>
        <div class="sub">Быстрый VPN в Германии. Пробный период 3 дня.</div>
        
        <input type="text" id="telegramId" placeholder="Ваш Telegram ID (цифры)">
        <button onclick="getTrial()">Получить VPN</button>
        
        <div id="loading" class="loading">🔄 Создаю VPN...</div>
        <div id="result" class="result"></div>
        
        <div class="footer">
            <a href="https://t.me/jordanteamvpnbot">🤖 Бот</a> | 
            <a href="https://t.me/moderator_ms">🆘 Поддержка</a> | 
            <a href="https://www.happ.su/main/ru">📱 Скачать Happ</a>
        </div>
    </div>

    <script>
        async function getTrial() {
            const telegramId = document.getElementById('telegramId').value.trim();
            const resultDiv = document.getElementById('result');
            const loadingDiv = document.getElementById('loading');
            
            if (!telegramId) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ Введите Telegram ID';
                return;
            }
            if (!/^\d+$/.test(telegramId)) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ ID должен содержать только цифры';
                return;
            }
            
            resultDiv.style.display = 'none';
            loadingDiv.style.display = 'block';
            
            try {
                const response = await fetch('http://185.121.134.172:8000/api/trial', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telegram_id: parseInt(telegramId) })
                });
                
                const data = await response.json();
                loadingDiv.style.display = 'none';
                
                if (data.success && data.link) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        ✅ Ваш пробный VPN готов на 3 дня!<br><br>
                        📱 Как подключиться:<br>
                        1️⃣ Скачайте <a href="https://www.happ.su/main/ru" target="_blank">Happ</a><br>
                        2️⃣ Откройте Happ → + → Импорт из буфера обмена<br>
                        3️⃣ Нажмите на ссылку ниже<br><br>
                        <div class="link-code" id="vpnLink">${data.link}</div>
                        <button onclick="copyLink()">📋 Скопировать ссылку</button>
                        <br><br>
                        🎁 Пробный период: 3 дня
                    `;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = data.message || '❌ Ошибка получения VPN. Возможно, вы уже активировали пробный период.';
                }
            } catch (error) {
                loadingDiv.style.display = 'none';
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ Ошибка подключения к серверу. Проверьте интернет и попробуйте позже.<br><br>Если ошибка повторяется, обратитесь к поддержке: @moderator_ms';
                console.error('Error:', error);
            }
        }
        
        function copyLink() {
            const link = document.getElementById('vpnLink').innerText;
            navigator.clipboard.writeText(link);
            alert('Ссылка скопирована!');
        }
    </script>
</body>
</html>
