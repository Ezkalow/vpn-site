<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JordanVPN | Регистрация</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system; background: #000; color: #fff; line-height: 1.5; padding: 20px; }
        .container { max-width: 500px; margin: 50px auto; background: #0a0a0a; border: 1px solid #222; border-radius: 24px; padding: 40px; }
        h1 { font-size: 28px; margin-bottom: 8px; }
        .sub { color: #666; margin-bottom: 32px; }
        input { width: 100%; padding: 14px 20px; background: #1a1a1a; border: 1px solid #333; border-radius: 40px; color: #fff; font-size: 16px; margin-bottom: 16px; outline: none; }
        button { width: 100%; padding: 14px; background: #fff; color: #000; border: none; border-radius: 40px; font-weight: 600; cursor: pointer; font-size: 16px; }
        .result { margin-top: 20px; padding: 16px; border-radius: 16px; display: none; }
        .success { background: rgba(46,204,113,0.1); border: 1px solid #2ecc71; display: block; }
        .error { background: rgba(231,76,60,0.1); border: 1px solid #e74c3c; display: block; }
        .link-code { background: #1a1a1a; padding: 12px; border-radius: 12px; font-family: monospace; word-break: break-all; margin: 16px 0; font-size: 12px; }
        .footer { text-align: center; margin-top: 24px; font-size: 12px; color: #666; }
        a { color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇩🇪 JordanVPN</h1>
        <div class="sub">Быстрый VPN в Германии. Пробный период 3 дня.</div>
        
        <input type="text" id="telegramId" placeholder="Ваш Telegram ID (цифры)">
        <button onclick="register()">Получить VPN</button>
        
        <div id="result" class="result"></div>
        
        <div class="footer">
            <a href="https://t.me/jordanteamvpnbot">🤖 Бот</a> | 
            <a href="https://t.me/moderator_ms">🆘 Поддержка</a>
        </div>
    </div>

    <script>
        async function register() {
            const telegramId = document.getElementById('telegramId').value.trim();
            const resultDiv = document.getElementById('result');
            
            if (!telegramId) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ Введите Telegram ID';
                return;
            }
            if (!/^\d+$/.test(telegramId)) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ ID должен содержать только цифры';
                return;
            }
            
            resultDiv.className = 'result';
            resultDiv.innerHTML = '🔄 Регистрируем...';
            resultDiv.style.display = 'block';
            
            try {
                const response = await fetch(`https://vpntelegramproxy.mooo.com:8443/api/register?user_id=${telegramId}&_=${Date.now()}`);
                const data = await response.json();
                
                if (data.success && data.link) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        ✅ Регистрация прошла успешно!<br><br>
                        📱 <strong>Как подключиться:</strong><br>
                        1️⃣ Скачайте <a href="https://www.happ.su/main/ru" target="_blank">Happ</a><br>
                        2️⃣ Откройте Happ → + → Импорт из буфера обмена<br>
                        3️⃣ Нажмите на ссылку ниже<br><br>
                        <div class="link-code" id="vpnLink">${data.link}</div>
                        <button onclick="copyLink()">📋 Скопировать ссылку</button>
                        <br><br>
                        🎁 Пробный период: 3 дня
                    `;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = data.message || '❌ Ошибка. Возможно, вы уже регистрировались.';
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ Ошибка сервера. Попробуйте позже.';
                console.error(error);
            }
        }
        
        function copyLink() {
            const link = document.getElementById('vpnLink').innerText;
            navigator.clipboard.writeText(link);
            alert('Ссылка скопирована!');
        }
    </script>
</body>
</html>
