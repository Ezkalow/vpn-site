<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JordanVPN | Регистрация</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui; background: #000; color: #fff; line-height: 1.5; padding: 20px; }
        .container { max-width: 500px; margin: 50px auto; background: #0a0a0a; border: 1px solid #222; border-radius: 24px; padding: 40px; }
        h1 { text-align: center; margin-bottom: 8px; }
        .sub { text-align: center; color: #666; margin-bottom: 32px; }
        input { width: 100%; padding: 14px 20px; background: #1a1a1a; border: 1px solid #333; border-radius: 40px; color: #fff; font-size: 16px; margin-bottom: 16px; }
        button { width: 100%; padding: 14px; background: #fff; color: #000; border: none; border-radius: 40px; font-weight: 600; cursor: pointer; font-size: 16px; margin-bottom: 16px; }
        .tab { display: flex; gap: 10px; margin-bottom: 24px; }
        .tab button { background: transparent; border: 1px solid #333; color: #fff; margin-bottom: 0; }
        .tab button.active { background: #fff; color: #000; }
        .result { margin-top: 16px; padding: 12px; border-radius: 12px; display: none; font-size: 14px; }
        .success { background: rgba(46,204,113,0.1); border: 1px solid #2ecc71; display: block; }
        .error { background: rgba(231,76,60,0.1); border: 1px solid #e74c3c; display: block; }
        .link-code { background: #1a1a1a; padding: 12px; border-radius: 12px; font-family: monospace; word-break: break-all; margin: 16px 0; font-size: 12px; }
        .footer { text-align: center; margin-top: 24px; font-size: 12px; color: #666; }
        a { color: #fff; }
        .hidden { display: none; }
        .profile-info { background: #1a1a1a; border-radius: 16px; padding: 16px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇩🇪 JordanVPN</h1>
        <div class="sub">Быстрый VPN в Германии</div>
        
        <div class="tab">
            <button id="tabLogin" onclick="showLogin()" class="active">Вход</button>
            <button id="tabRegister" onclick="showRegister()">Регистрация</button>
        </div>
        
        <!-- Форма входа -->
        <div id="loginForm">
            <input type="text" id="loginUsername" placeholder="Имя пользователя">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button onclick="login()">Войти</button>
            <div id="loginResult" class="result"></div>
        </div>
        
        <!-- Форма регистрации -->
        <div id="registerForm" class="hidden">
            <input type="text" id="regUsername" placeholder="Имя пользователя">
            <input type="password" id="regPassword" placeholder="Пароль">
            <input type="text" id="regTelegram" placeholder="Telegram ID (цифры)">
            <button onclick="register()">Зарегистрироваться</button>
            <div id="regResult" class="result"></div>
        </div>
        
        <!-- Профиль -->
        <div id="profileForm" class="hidden">
            <div id="profileInfo" class="profile-info"></div>
            <button onclick="getTrial()">🎁 Получить пробный VPN (3 дня)</button>
            <div id="trialResult" class="result"></div>
        </div>
        
        <div class="footer">
            <a href="https://t.me/jordanteamvpnbot">🤖 Бот</a> | 
            <a href="https://t.me/moderator_ms">🆘 Поддержка</a> | 
            <a href="https://www.happ.su/main/ru">📱 Скачать Happ</a>
        </div>
    </div>

    <script>
        let currentUser = null;
        
        function showLogin() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('profileForm').classList.add('hidden');
            document.getElementById('tabLogin').classList.add('active');
            document.getElementById('tabRegister').classList.remove('active');
        }
        
        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('profileForm').classList.add('hidden');
            document.getElementById('tabLogin').classList.remove('active');
            document.getElementById('tabRegister').classList.add('active');
        }
        
        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const resultDiv = document.getElementById('loginResult');
            
            if (!username || !password) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ Заполните все поля';
                return;
            }
            
            resultDiv.className = 'result';
            resultDiv.innerHTML = '🔄 Вход...';
            
            try {
                const response = await fetch('https://vpntelegramproxy.mooo.com:8443/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (data.success) {
                    currentUser = data.user;
                    document.getElementById('loginForm').classList.add('hidden');
                    document.getElementById('profileForm').classList.remove('hidden');
                    document.getElementById('profileInfo').innerHTML = `
                        <p><strong>👤 ${currentUser.username}</strong></p>
                        <p>💰 Баланс: ${currentUser.balance} руб</p>
                        <p>🆔 Telegram ID: ${currentUser.telegram_id || 'не указан'}</p>
                    `;
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = '✅ Вход выполнен!';
                    setTimeout(() => { resultDiv.style.display = 'none'; }, 2000);
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = data.message || '❌ Неверный логин или пароль';
                }
            } catch(e) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ Ошибка сервера';
            }
        }
        
        async function register() {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const telegramId = document.getElementById('regTelegram').value;
            const resultDiv = document.getElementById('regResult');
            
            if (!username || !password || !telegramId) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ Заполните все поля';
                return;
            }
            if (!/^\d+$/.test(telegramId)) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ Telegram ID должен содержать только цифры';
                return;
            }
            
            resultDiv.className = 'result';
            resultDiv.innerHTML = '🔄 Регистрация...';
            
            try {
                const response = await fetch('https://vpntelegramproxy.mooo.com:8443/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, telegram_id: parseInt(telegramId) })
                });
                const data = await response.json();
                if (data.success && data.link) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        ✅ Регистрация успешна!<br><br>
                        🔗 Ваша ссылка для подключения:<br>
                        <div class="link-code">${data.link}</div>
                        <button onclick="copyToClipboard('${data.link}')">📋 Копировать</button>
                    `;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = data.message || '❌ Ошибка регистрации';
                }
            } catch(e) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ Ошибка сервера';
            }
        }
        
        async function getTrial() {
            if (!currentUser || !currentUser.telegram_id) {
                alert('Сначала укажите Telegram ID в профиле (при регистрации)');
                return;
            }
            
            const resultDiv = document.getElementById('trialResult');
            resultDiv.className = 'result';
            resultDiv.innerHTML = '🔄 Получаю VPN...';
            
            try {
                const response = await fetch('https://vpntelegramproxy.mooo.com:8443/api/trial', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telegram_id: currentUser.telegram_id })
                });
                const data = await response.json();
                if (data.success && data.link) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        ✅ Ваш пробный VPN готов на 3 дня!<br><br>
                        🔗 Ссылка:<br>
                        <div class="link-code">${data.link}</div>
                        <button onclick="copyToClipboard('${data.link}')">📋 Копировать</button>
                        <br><br>📱 Откройте <a href="https://www.happ.su/main/ru" target="_blank">Happ</a> → + → Импорт из буфера обмена
                    `;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = data.message || '❌ Ошибка получения VPN';
                }
            } catch(e) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ Ошибка сервера';
            }
        }
        
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            alert('Ссылка скопирована!');
        }
        
        // Проверяем сохранённую сессию
        showLogin();
    </script>
</body>
</html>
