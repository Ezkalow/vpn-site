<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JordanVPN | Пробный VPN</title>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto;
            background: #000;
            color: #fff;
            text-align: center;
            padding: 2rem;
            line-height: 1.5;
        }
        input, button {
            padding: 12px 20px;
            margin: 10px;
            border-radius: 40px;
            border: none;
            font-size: 16px;
        }
        input {
            background: #1a1a1a;
            color: #fff;
            width: 260px;
            border: 1px solid #333;
        }
        button {
            background: #fff;
            color: #000;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        button:hover {
            background: #ddd;
            transform: translateY(-2px);
        }
        .result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 24px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .success {
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid #2ecc71;
        }
        .error {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid #e74c3c;
        }
        .link-code {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 12px;
            font-family: monospace;
            word-break: break-all;
            margin: 16px 0;
            font-size: 12px;
        }
        a {
            color: #fff;
        }
        footer {
            margin-top: 40px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>🇩🇪 JordanVPN</h1>
    <p>Сервер в Германии. Пробный период — 3 дня бесплатно.</p>

    <div>
        <input type="text" id="userId" placeholder="Ваш Telegram ID">
        <button onclick="getTrial()">Получить VPN</button>
    </div>

    <div id="result" class="result" style="display: none;"></div>

    <footer>
        <p>📱 <a href="https://www.happ.su/main/ru">Скачать Happ</a> | 🆘 <a href="https://t.me/moderator_ms">Поддержка</a></p>
        <p>💳 Тарифы в боте: <a href="https://t.me/jordanteamvpnbot">@jordanteamvpnbot</a></p>
    </footer>

    <script>
        async function getTrial() {
            const userId = document.getElementById('userId').value.trim();
            const resultDiv = document.getElementById('result');
            
            if (!userId) {
                resultDiv.style.display = 'block';
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ Введите ваш Telegram ID';
                return;
            }
            if (!/^\d+$/.test(userId)) {
                resultDiv.style.display = 'block';
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ ID должен содержать только цифры';
                return;
            }

            resultDiv.style.display = 'block';
            resultDiv.className = 'result';
            resultDiv.innerHTML = '🔄 Создаю VPN...';

            try {
                const url = `https://vpntelegramproxy.mooo.com:8443/api/trial?user_id=${userId}&_=${Date.now()}`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.success && data.link) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        ✅ Ваш пробный VPN готов!<br>
                        <div class="link-code" id="vpnLink">${data.link}</div>
                        <button onclick="copyLink()">📋 Скопировать ссылку</button>
                        <p style="margin-top: 12px; font-size: 12px;">Откройте Happ → Импорт из буфера обмена → Вставьте ссылку</p>
                    `;
                    window.vpnLink = data.link;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = data.message || '❌ Ошибка получения VPN. Возможно, у вас уже есть активная подписка.';
                }
            } catch (err) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ Ошибка подключения к серверу. Попробуйте позже.';
                console.error(err);
            }
        }

        function copyLink() {
            if (window.vpnLink) {
                navigator.clipboard.writeText(window.vpnLink);
                alert('Ссылка скопирована!');
            } else {
                alert('Не удалось скопировать ссылку');
            }
        }
    </script>
</body>
</html>
